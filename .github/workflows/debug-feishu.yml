name: Debug Feishu Notification

on:
  workflow_dispatch:

jobs:
  notify: 
    runs-on: ubuntu-latest

    steps:
      - name: Send Dynamic Message
        env:
          FEISHU_WEBHOOK: ${{secrets.FEISHU_WEBHOOK}}
          REPOSITORY: ${{github.repository}}
          BRANCH: ${{github.ref_name}}
          ACTOR: ${{github.actor}}
          WORKFLOW: ${{github.workflow}}
          COMMIT: ${{github.sha}}
          STATUS: success

        run: |
          MESSAGE="🚀 Playwright 自动化测试完成
          📦 项目：$REPOSITORY
          🌿 分支：$BRANCH
          👤 提交人：$ACTOR
          ⚙ Workflow: $WORKFLOW
          ✅ 状态：$STATUS
          📝 Commit: ${COMMIT:0:7}"

          echo "========== Feishu Message =========="
          echo "$MESSAGE"
          echo "========== End Feishu Message =========="

          curl -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d @- <<EOF 
          {
            "msg_type": "text",
            "content": {
              "text": "$MESSAGE"
            }
          }
          EOF