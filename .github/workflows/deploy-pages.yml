name: Deploy Allure Report

on:
  workflow_run:
    workflows: 
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download Test Artifacts
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: ci.yml
          run_id: ${{ github.event.workflow_run.id }}
          path: artifacts

      - name: Show Downloaded Files
        run: |
          pwd
          ls -R artifacts

      - name: Merge Allure Request
        run: |
          mkdir merged-results

          find artifacts -type d -name "allure-results" | while read dir
          do
            echo "Copying: $dir"
            cp -r "$dir"/* merged-results/ || true
          done

          echo "Merged Results:"
          ls -R merged-results
